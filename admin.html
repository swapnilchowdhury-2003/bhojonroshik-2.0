<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhojonroshik | Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ব্যাকগ্রাউন্ডে হালকা লোগো রাখার জন্য */
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: url('images/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.1;
            z-index: -1;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: none;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card login-card p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-dark">Admin Access</h2>
                        <p class="text-muted small">শুধুমাত্র অ্যাডমিনদের জন্য</p>
                    </div>
                    
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="userInput" class="form-control" placeholder="Enter username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="passInput" class="form-control" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 fw-bold py-2">Login Now</button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <a href="index.html" class="text-decoration-none text-secondary small">← Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault(); // পেজ রিফ্রেশ হওয়া বন্ধ করবে

            const user = document.getElementById("userInput").value;
            const pass = document.getElementById("passInput").value;

            // সিম্পল ইউজারনেম ও পাসওয়ার্ড চেক
           if (user === "admin" && pass === "1234") {
    sessionStorage.setItem("adminLoggedIn", "true"); // এই লাইন add করো
    alert("স্বাগতম স্বপ্নীল! লগইন সফল হয়েছে।");
    window.location.href = "admin_dashboard.html";
}
        });
    </script>

</body>
</html>
