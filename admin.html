<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhojonroshik | Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(145deg, #f7f9ff 0%, #eceffb 100%);
        }
        /* ব্যাকগ্রাউন্ডে হালকা লোগো রাখার জন্য */
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: url('images/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.1;
            z-index: -1;
        }
        .brand-logo {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            object-fit: contain;
            background: #fff;
            border: 1px solid #e9ecef;
            box-shadow: 0 10px 24px rgba(0,0,0,0.12);
            padding: 10px;
        }
        .login-card {
            border-radius: 20px;
            box-shadow: 0 12px 35px rgba(24, 31, 56, 0.15);
            border: none;
            background-color: rgba(255, 255, 255, 0.95);
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card login-card p-4">
                    <div class="text-center mb-4">
                        <img src="images/logo.png" alt="Bhojonroshik Logo" class="brand-logo mb-3">
                        <div class="badge text-bg-dark mb-2">ADMIN PANEL</div>
                        <h2 class="fw-bold text-dark">Admin Access</h2>
                        <p class="text-muted small">শুধুমাত্র অ্যাডমিনদের জন্য</p>
                    </div>
                    
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                                <input type="text" id="userInput" class="form-control" placeholder="Enter username" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-shield-lock-fill"></i></span>
                                <input type="password" id="passInput" class="form-control" placeholder="Enter password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 fw-bold py-2">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Login Now
                        </button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <a href="index.html" class="text-decoration-none text-secondary small">← Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault(); // পেজ রিফ্রেশ হওয়া বন্ধ করবে

            const user = document.getElementById("userInput").value;
            const pass = document.getElementById("passInput").value;

            // সিম্পল ইউজারনেম ও পাসওয়ার্ড চেক
           if (user === "admin" && pass === "1234") {
    sessionStorage.setItem("adminLoggedIn", "true"); // এই লাইন add করো
    alert("স্বাগতম স্বপ্নীল! লগইন সফল হয়েছে।");
    window.location.href = "admin_dashboard.html";
}
        });
    </script>

</body>
</html>
